name: Final performance snapshots

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Capture performances nearing showtime
        run: |
          curl --fail --show-error --silent \
            --retry 3 --retry-delay 10 --retry-all-errors --max-time 300 \
            "${{ secrets.RENDER_APP_URL }}/api/snapshot/finals?secret=${{ secrets.SNAPSHOT_SECRET }}&windowMinutes=15&lateGraceMinutes=30"
