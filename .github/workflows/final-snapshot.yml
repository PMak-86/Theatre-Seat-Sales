name: Final performance snapshots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Capture performances nearing showtime
        run: |
          curl --fail --show-error --silent \
            "${{ secrets.RENDER_APP_URL }}/api/snapshot/finals?secret=${{ secrets.SNAPSHOT_SECRET }}&windowMinutes=15"
